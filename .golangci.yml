version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gosec
    - prealloc

  settings:
    misspell:
      locale: US
    gosec:
      excludes:
        - G104
        - G304

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam
          - errcheck
      - path: testdata/
        linters:
          - all

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/opensearch-project/opensearch-plugins-metrics-exporter
