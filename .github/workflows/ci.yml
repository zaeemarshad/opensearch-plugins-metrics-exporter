name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  test:
    name: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go test
        run: go test ./...

      # Optional: enable if you have .golangci.yml and want lint gating
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
