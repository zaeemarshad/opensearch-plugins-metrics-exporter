name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build (cross-platform)
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          PKG="./cmd/exporter"
          GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o "dist/opensearch-plugins-metrics-exporter_${VERSION}_linux_amd64" "$PKG"
          GOOS=darwin  GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o "dist/opensearch-plugins-metrics-exporter_${VERSION}_darwin_amd64" "$PKG"

      - name: Create GitHub Release + upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
